name: Bug report
description: Something in Chattr isn't behaving the way it should.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen and what actually happened.
      placeholder: When I send a message to the widget, I expected a streamed reply but the response comes back empty.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimum steps that reliably trigger the bug. Include the tenant config, widget embed snippet, or curl call if relevant.
      placeholder: |
        1. Start the server with `pnpm dev`
        2. Open demo.html
        3. Send "hello"
        4. Observe empty response
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Model provider
      options:
        - openai
        - anthropic
        - azure-openai
        - ollama
        - other / not applicable
    validations:
      required: true

  - type: input
    id: chattr-version
    attributes:
      label: Chattr version or commit
      description: Output of `git rev-parse --short HEAD` or the release tag.
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: v20.x
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server console output, browser console errors, or network responses. Redact any API keys or customer data.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this hasn't been reported.
          required: true
        - label: I can reproduce this on `main`.
          required: false
